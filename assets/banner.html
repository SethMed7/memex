<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; }
  .banner { width: 1600px; height: 400px; background: #0d1210; position: relative; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .glow { position: absolute; inset: 0; background: radial-gradient(820px 460px at 26% 50%, rgba(16,185,129,0.14), transparent 66%); }
  .row { position: absolute; left: 110px; top: 50%; transform: translateY(-50%); display: flex; align-items: center; gap: 40px; }
  h1 { margin: 0; font-size: 138px; font-weight: 800; letter-spacing: -0.04em; color: #eaf2ee; }
  .tag { position: absolute; left: 320px; bottom: 96px; margin: 0; font: 500 27px/1 ui-monospace, "SF Mono", Menlo, monospace; color: #34d399; }
  .nodes { position: absolute; right: 96px; top: 50%; transform: translateY(-50%); }
</style>
</head>
<body>
<div class="banner">
  <div class="glow"></div>
  <div class="row">
    <svg width="150" height="150" viewBox="0 0 256 256">
      <path d="M72 182 L72 116 Q72 90 100 90 Q128 90 128 116 L128 182 M128 116 Q128 90 156 90 Q184 90 184 116 L184 182"
            fill="none" stroke="#10b981" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="72" cy="182" r="12" fill="#6ee7b7"/><circle cx="128" cy="182" r="12" fill="#6ee7b7"/><circle cx="184" cy="182" r="12" fill="#6ee7b7"/>
    </svg>
    <h1>memex</h1>
  </div>
  <p class="tag">your knowledge, structured.</p>
  <svg class="nodes" width="360" height="300" viewBox="0 0 360 300" id="g"></svg>
  <script>
    const N=[[60,80],[160,40],[250,110],[120,200],[260,210],[330,70]], E=[[0,1],[1,2],[0,3],[3,4],[2,4],[1,5],[2,5]];
    const g=document.getElementById("g"), ns="http://www.w3.org/2000/svg";
    for(const [a,b] of E){const l=document.createElementNS(ns,"line");l.setAttribute("x1",N[a][0]);l.setAttribute("y1",N[a][1]);l.setAttribute("x2",N[b][0]);l.setAttribute("y2",N[b][1]);l.setAttribute("stroke","#1d3a2e");l.setAttribute("stroke-width","2.5");g.appendChild(l);}
    N.forEach(([x,y],i)=>{const c=document.createElementNS(ns,"circle");c.setAttribute("cx",x);c.setAttribute("cy",y);c.setAttribute("r",i%3===0?12:8);c.setAttribute("fill",i%3===0?"#10b981":"#6ee7b7");c.setAttribute("opacity",i%3===0?"0.95":"0.7");g.appendChild(c);});
  </script>
</div>
</body>
</html>
