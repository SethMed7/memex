<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; }
  .banner {
    width: 1600px; height: 400px; background: #0c0e1a; position: relative; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
  }
  /* indigo glow, left of center */
  .glow { position: absolute; inset: 0;
    background: radial-gradient(840px 480px at 28% 50%, rgba(99,102,241,0.18), transparent 64%); }
  /* faint structure watermark on the right — a markdown index, very low contrast */
  .index { position: absolute; right: 96px; top: 50%; transform: translateY(-50%);
    font: 400 25px/2.05 ui-monospace, "SF Mono", Menlo, monospace; color: #2b3157; white-space: pre; }
  .index b { color: #3a4170; font-weight: 600; }
  .lock { position: absolute; left: 112px; top: 50%; transform: translateY(-50%); }
  h1 { margin: 0; font-size: 142px; font-weight: 800; letter-spacing: -0.045em; color: #e6e8f5;
    line-height: 1; display: flex; align-items: flex-end; }
  /* blinking-cursor caret — a quiet nod to text + terminal */
  .caret { width: 22px; height: 104px; background: #6366f1; margin-left: 18px; border-radius: 3px;
    box-shadow: 0 0 28px rgba(99,102,241,0.55); }
  .tag { margin: 26px 0 0 4px; font: 500 27px/1 ui-monospace, "SF Mono", Menlo, monospace;
    color: #a5b4fc; letter-spacing: 0.01em; }
</style>
</head>
<body>
<div class="banner">
  <div class="glow"></div>
  <div class="index"><b>self/</b>      who the subject is
<b>wiki/</b>      [[linked]] notes
<b>history/</b>   the day-by-day stream
<b>chats/</b>     attachable conversations
<b>MAP.md</b>     the always-loaded spine</div>
  <div class="lock">
    <h1>memex<span class="caret"></span></h1>
    <p class="tag">your knowledge, structured.</p>
  </div>
</div>
</body>
</html>
