<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; }
  .banner {
    width: 1600px; height: 400px; background: #16181d; position: relative; overflow: hidden;
    font-family: "Georgia", "Times New Roman", serif;
  }
  .glow { position: absolute; inset: 0; background: radial-gradient(820px 460px at 24% 50%, rgba(205,127,90,0.13), transparent 66%); }
  .text { position: absolute; left: 110px; top: 50%; transform: translateY(-54%); }
  h1 { margin: 0; font-size: 124px; font-weight: 700; letter-spacing: -0.02em; color: #ece7da; }
  p { margin: 14px 0 0 4px; font: 400 26px/1 ui-monospace, "SF Mono", Menlo, monospace; color: #cd7f5a; letter-spacing: 0.02em; }
  svg { position: absolute; right: 70px; top: 50%; transform: translateY(-50%); }
</style>
</head>
<body>
<div class="banner">
  <div class="glow"></div>
  <div class="text">
    <h1>memex</h1>
    <p>your knowledge, structured.</p>
  </div>
  <!-- knowledge graph: linked notes -->
  <svg width="520" height="400" viewBox="0 0 520 400" fill="none" id="g"></svg>
  <script>
    const nodes = [[120,120],[250,70],[360,150],[180,250],[300,290],[430,240],[410,90],[90,300]];
    const edges = [[0,1],[1,2],[0,3],[3,4],[2,5],[4,5],[1,6],[2,6],[3,7],[6,5]];
    const g = document.getElementById("g");
    const ns = "http://www.w3.org/2000/svg";
    for (const [a,b] of edges) {
      const l = document.createElementNS(ns,"line");
      l.setAttribute("x1",nodes[a][0]); l.setAttribute("y1",nodes[a][1]);
      l.setAttribute("x2",nodes[b][0]); l.setAttribute("y2",nodes[b][1]);
      l.setAttribute("stroke","#3a3530"); l.setAttribute("stroke-width","2");
      g.appendChild(l);
    }
    nodes.forEach(([x,y],i) => {
      const c = document.createElementNS(ns,"circle");
      c.setAttribute("cx",x); c.setAttribute("cy",y);
      c.setAttribute("r", i % 3 === 0 ? 13 : 8);
      c.setAttribute("fill", i % 3 === 0 ? "#cd7f5a" : "#ece7da");
      c.setAttribute("opacity", i % 3 === 0 ? "1" : "0.82");
      g.appendChild(c);
    });
  </script>
</div>
</body>
</html>
