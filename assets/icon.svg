<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 256 256">
  <!-- memex — wordmark-only identity. The mark is simply the wordmark's first letter: a confident
       lowercase "m" in the brand type. No symbol, no glyph. -->
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="62%">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="256" height="256" rx="58" fill="#0c0e1a"/>
  <rect width="256" height="256" rx="58" fill="url(#glow)"/>
  <text x="128" y="180" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Helvetica, Arial, sans-serif"
        font-weight="800" font-size="196" letter-spacing="-10" fill="url(#ink)">m</text>
</svg>
