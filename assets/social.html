<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; }
  .card {
    width: 1280px; height: 640px; background: #0c0e1a; position: relative; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .glow { position: absolute; inset: 0;
    background: radial-gradient(780px 540px at 50% 38%, rgba(99,102,241,0.19), transparent 66%); }
  .lock { display: flex; align-items: flex-end; z-index: 1; }
  h1 { margin: 0; font-size: 150px; font-weight: 800; letter-spacing: -0.045em; color: #e6e8f5; line-height: 1; }
  .caret { width: 23px; height: 110px; background: #6366f1; margin-left: 20px; border-radius: 3px;
    box-shadow: 0 0 30px rgba(99,102,241,0.6); }
  .tag { margin: 28px 0 0; z-index: 1; font: 500 30px/1 ui-monospace, "SF Mono", Menlo, monospace; color: #a5b4fc; }
  .sub { margin: 30px 0 0; z-index: 1; font-size: 23px; color: #8a90c0; max-width: 880px;
    text-align: center; line-height: 1.55; }
  .sub b { color: #cdd2f0; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="lock">
    <h1>memex</h1><span class="caret"></span>
  </div>
  <p class="tag">your knowledge, structured.</p>
  <p class="sub">A local-first memory structure any AI assistant can plug into — <b>plain markdown you own</b>, no cloud, no lock-in.</p>
</div>
</body>
</html>
