<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; }
  .card { width: 1280px; height: 640px; background: #0d1210; position: relative; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .glow { position: absolute; inset: 0; background: radial-gradient(760px 520px at 50% 40%, rgba(16,185,129,0.15), transparent 68%); }
  .lock { display: flex; align-items: center; gap: 30px; z-index: 1; }
  h1 { margin: 0; font-size: 140px; font-weight: 800; letter-spacing: -0.04em; color: #eaf2ee; }
  .tag { margin: 24px 0 0; z-index: 1; font: 500 30px/1 ui-monospace, "SF Mono", Menlo, monospace; color: #34d399; }
  .sub { margin: 24px 0 0; z-index: 1; font-size: 23px; color: #8aa39a; max-width: 880px; text-align: center; line-height: 1.5; }
  .sub b { color: #cfe0d8; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="lock">
    <svg width="132" height="132" viewBox="0 0 256 256">
      <path d="M72 182 L72 116 Q72 90 100 90 Q128 90 128 116 L128 182 M128 116 Q128 90 156 90 Q184 90 184 116 L184 182"
            fill="none" stroke="#10b981" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="72" cy="182" r="12" fill="#6ee7b7"/><circle cx="128" cy="182" r="12" fill="#6ee7b7"/><circle cx="184" cy="182" r="12" fill="#6ee7b7"/>
    </svg>
    <h1>memex</h1>
  </div>
  <p class="tag">your knowledge, structured.</p>
  <p class="sub">A local-first memory structure any AI assistant can plug into — <b>plain markdown you own</b>, no cloud, no lock-in.</p>
</div>
</body>
</html>
